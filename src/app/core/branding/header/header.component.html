@if (branding$ | async; as branding) {
  @let pageHeader = branding.header;
  @let params = pageHeader?.params;
  @let banner = pageHeader?.banner;
  @let top = pageHeader?.top;
  @let headerMode = contentState.pageConfig()?.headerMode;
  <header
    [class.transparent-mode]="headerMode?.transparent"
    [class.header-inverse]="params?.inverse"
    [class.header-sticky]="sticky()"
    [class.light]="headerMode?.transparent && headerMode?.style === 'light'"
  >
    @if (showBanner()) {
      <app-header-banner [content]="banner" />
    }
    @if (top) {
      <app-header-top [content]="top" />
    }
    @if (branding?.header) {
      <div class="sticky-sentinel" #sentinel></div>
      <div class="menu-anchor" #menuAnchor [style.minHeight.px]="menuHeight() || null">
        <app-menu class="menu-bar" [class.is-fixed]="sticky()" />
      </div>
    }
  </header>
}
