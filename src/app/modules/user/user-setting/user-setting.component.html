@if (user(); as user) {
  <div class="user-setting">
    @if (loading()) {
      <div class="load">
        <app-loading />
      </div>
    }
    <div class="user-info">
      <div class="user-avatar">
        @if ($any(user).picture) {
          <div class="avatar-wrapper">
            <img width="80" height="80" class="avatar-img" src="{{ $any(user).picture }}" alt="" />
            <input
              type="file"
              #avatarInput
              accept="image/*"
              style="display: none"
              (change)="handleFileChange($event, $any(user))"
            />
            <div class="upload">
              <app-btn
                (click)="avatarInput.click()"
                matTooltip="更新头像"
                matTooltipPosition="above"
                [content]="{ mode: 'icon', icon: { svg: 'camera' } }"
              />
            </div>
          </div>
        }
        <div class="user-details">
          <div class="name" [matTooltip]="$any(user).display_name" matTooltipPosition="above">
            {{ $any(user).display_name }}
          </div>
          <div class="mail" [matTooltip]="$any(user).mail" matTooltipPosition="above">
            {{ $any(user).mail }}
          </div>
        </div>
      </div>
    </div>
    <div class="form">
      <app-formly [form]="form" [fields]="fields" [model]="model" />
    </div>
    <div class="actions">
      <app-btn
        (click)="form.reset()"
        [content]="{
          label: '重置',
        }"
      />
      <app-btn
        (click)="onLogout()"
        [content]="{
          label: '退出',
          color: 'warn',
          icon: { svg: 'logout' },
        }"
      />
      <app-btn
        (click)="onUpdate(model, $any(user))"
        [content]="{
          label: '更新账户',
          color: 'primary',
          mode: 'raised',
          disabled: !form.valid,
          icon: {
            svg: 'pencil',
          },
        }"
      />
    </div>
  </div>
}
