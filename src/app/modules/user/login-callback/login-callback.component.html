<div class="callback-page">
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>
  <div class="bg-scan" aria-hidden="true"></div>

  <div class="callback-card" role="status" aria-live="polite">
    <span class="corner corner-tl" aria-hidden="true"></span>
    <span class="corner corner-tr" aria-hidden="true"></span>
    <span class="corner corner-bl" aria-hidden="true"></span>
    <span class="corner corner-br" aria-hidden="true"></span>

    @if (error()) {
      <div class="state state-error">
        <div class="status-pill status-pill-error">
          <span class="pill-dot"></span>
          <span class="pill-label">ERROR · 0x401</span>
        </div>
        <div class="orbit orbit-error" aria-hidden="true">
          <span class="orbit-ring ring-static"></span>
          <div class="orbit-core core-error">
            <mat-icon>error_outline</mat-icon>
          </div>
        </div>
        <h1 class="title">认证失败</h1>
        <p class="message">{{ error() }}</p>
        <div class="data-stream is-error" aria-hidden="true"></div>
        <div class="actions">
          <button mat-flat-button color="primary" (click)="retry()">
            <mat-icon>refresh</mat-icon>
            <span>重新认证</span>
          </button>
          <button mat-stroked-button (click)="goLogin()">返回登录</button>
        </div>
      </div>
    } @else {
      <div class="state state-loading">
        <div class="status-pill">
          <span class="pill-dot"></span>
          <span class="pill-label">AUTHENTICATING</span>
        </div>
        <div class="orbit" aria-hidden="true">
          <span class="orbit-ring ring-1"></span>
          <span class="orbit-ring ring-2"></span>
          <span class="orbit-ring ring-3"></span>
          <div class="orbit-core">
            <mat-icon>lock</mat-icon>
          </div>
        </div>
        <h1 class="title">正在登录</h1>
        <p class="message">正在与认证服务器建立安全连接…</p>
        <div class="data-stream" aria-hidden="true"></div>
        <div class="telemetry" aria-hidden="true">
          <span class="telemetry-item">
            <span class="t-label">PROTOCOL</span>
            <span class="t-value">OAUTH 2.0</span>
          </span>
          <span class="telemetry-divider"></span>
          <span class="telemetry-item">
            <span class="t-label">STATUS</span>
            <span class="t-value t-value-active">SECURE</span>
          </span>
          <span class="telemetry-divider"></span>
          <span class="telemetry-item">
            <span class="t-label">CIPHER</span>
            <span class="t-value">TLS 1.3</span>
          </span>
        </div>
      </div>
    }
  </div>
</div>
