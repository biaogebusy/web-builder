@let configData = builderConfig$ | async;
@if (currentPage(); as page) {
  @if (page.body.length > 0) {
    <div class="builder-list" id="gsap-scroller">
      <div class="wrapper" [class]="previewClass$ | async">
        @if (builder.loading()) {
          <div class="load">
            <app-loading />
          </div>
        }
        <div
          #builderList
          id="builder-list"
          cdkDropList
          [class.empty]="page.body.length === 0"
          [cdkDropListConnectedTo]="['widgets']"
          [cdkDropListData]="page.body"
          (cdkDropListDropped)="drop($event)"
        >
          @for (item of page.body; track item; let i = $index) {
            <div
              id="item-{{ i }}"
              class="component-item"
              cdkDrag
              [cdkDragDisabled]="true"
              [cdkDragData]="item"
            >
              @if (item) {
                <app-dynamic-component [attr.data-path]="i" [inputs]="item" />
                @if (configData) {
                  <div
                    #actionBtn
                    class="add-new-section"
                    [attr.data-path]="i"
                  >
                    <button
                      mat-raised-button
                      (click)="addNewSection(actionBtn, 'section', configData.newSection)"
                    >
                      <div class="section-btn-content">
                        <app-icon class="mr-1" [content]="{ svg: 'plus' }" />
                        <span>{{ 'BUILDER.LIST.ADD_SECTION' | translate }}</span>
                      </div>
                    </button>
                    <button
                      class="new-widget"
                      [matTooltip]="'BUILDER.LIST.SELECT_WIDGET' | translate"
                      mat-icon-button
                      [matMenuTriggerFor]="menu"
                    >
                      <app-icon [content]="{ svg: 'chevron-down' }" />
                    </button>
                    <mat-menu #menu="matMenu">
                      <button
                        mat-menu-item
                        (click)="addNewSection(actionBtn, 'widget', configData?.newSection)"
                      >
                        <div class="menu-item-content">
                          <app-icon [content]="{ svg: 'widgets-outline' }" />
                          <span>{{ 'BUILDER.LIST.SELECT_WIDGET' | translate }}</span>
                        </div>
                      </button>
                      <button mat-menu-item (click)="onPasteData(actionBtn)">
                        <div class="menu-item-content">
                          <app-icon [content]="{ svg: 'content-paste' }" />
                          <span>{{ 'BUILDER.LIST.PASTE_WIDGET' | translate }}</span>
                        </div>
                      </button>
                    </mat-menu>
                  </div>
                }
              }
            </div>
          }
        </div>
        @if (builder.switchPreivew$ | async) {
          <div class="iframe-wrapper">
            <app-iframe class="preview-iframe" [content]="{ url: '/preview' }" />
          </div>
        }
      </div>
    </div>
    <app-btn
      class="float-action-btn"
      [matMenuTriggerFor]="menu"
      [content]="{
        mode: 'mini-fab',
        color: 'primary',
        icon: {
          svg: 'dots-vertical',
        },
      }"
    />
  } @else {
    <app-default-page />
  }
}

<mat-menu #menu="matMenu">
  <button mat-menu-item (click)="onNewPage()">
    <div class="menu-item-content">
      <app-icon [content]="{ svg: 'pencil-plus', color: 'primary' }" />
      <span>{{ 'BUILDER.LIST.NEW_PAGE' | translate }}</span>
    </div>
  </button>

  <button mat-menu-item (click)="goBackUiux()">
    <div class="menu-item-content">
      <app-icon [content]="{ svg: 'youtube-subscription', color: 'primary' }" />
      <span>{{ 'BUILDER.LIST.VIEW_WIDGETS' | translate }}</span>
    </div>
  </button>

  <button mat-menu-item (click)="onClearHistory()">
    <div class="menu-item-content">
      <app-icon [content]="{ svg: 'delete-empty-outline', color: 'warn' }" />
      <span>{{ 'BUILDER.COMMON.CLEAR_DRAFT' | translate }}</span>
    </div>
  </button>
</mat-menu>
