@if (content(); as contentValue) {
  <div class="inline-editor">
    @if (contentValue.fields) {
      <app-formly [fields]="contentValue.fields" [model]="model" (modelChange)="onModelChange($event)" />
    }
    <div class="actions m-top-sm">
      <app-btn
        (click)="onClear()"
        [content]="{
          label: 'BUILDER.INLINE_EDITOR.CLEAR_STYLES' | translate,
          color: 'warn',
          icon: { svg: 'format-clear' },
        }"
      />
    </div>
  </div>
}
