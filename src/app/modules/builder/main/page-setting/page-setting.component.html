<div class="page-setting-wrapper">
  <div class="page-setting">
    @if (loading()) {
      <div class="load">
        <app-loading />
      </div>
    }
    <app-formly [form]="form" [fields]="fields" [model]="model" />
    <div class="actions">
      <app-btn
        (click)="onUpdate(model)"
        [content]="{
          label: 'BUILDER.PAGE_SETTING.UPDATE' | translate,
          color: 'primary',
          mode: 'raised',
        }"
      />
      @if (type === 'node--json') {
        <app-btn
          (click)="onJson()"
          [content]="{
            label: 'BUILDER.PAGE_SETTING.EDIT_JSON' | translate,
            color: 'primary',
            mode: 'stroked',
          }"
        />
      }
      @if (type === 'node--landing_page') {
        <app-btn
          (click)="onPreview()"
          [content]="{
            label: 'BUILDER.PAGE_SETTING.PREVIEW' | translate,
            color: 'primary',
            mode: 'stroked',
          }"
        />
      }
      <app-btn
        (click)="deletePage(model)"
        [content]="{
          label: 'BUILDER.PAGE_SETTING.DELETE' | translate,
          color: 'warn',
        }"
      />
    </div>
  </div>
</div>
