<div class="config-check">
  <app-title
    [content]="{
      label: '配置检测清单',
      classes: 'mat-headline-4 bold',
      style: 'style-v4',
    }"
  ></app-title>

  <div class="check-header">
    <div class="check-count">检查清单 {{ completedCount() }}/{{ totalCount }}</div>
    <app-btn
      (click)="runTests()"
      [content]="{
        label: '开始检测',
        color: 'primary',
        mode: 'raised',
        icon: {
          svg: 'check',
        },
      }"
    />
  </div>

  <div
    class="result-list"
  >
    @for (result of results(); track result) {
      <div
        class="result-item"
        [class.success]="result.success"
      >
        <div class="result-row">
          <div class="result-icon">
            @if (result.success) {
              <app-icon [content]="{ svg: 'check-circle', color: 'primary' }"></app-icon>
            } @else {
              <app-icon [content]="{ svg: 'alert-circle', color: 'warn' }"></app-icon>
            }
          </div>
          <div class="result-detail">
            <div class="result-name">{{ result.name }}</div>
            <p class="result-desc">{{ result.description }}</p>
            <p class="result-desc">响应时间: {{ result.responseTime }}ms</p>
            @if (!result.success) {
              <p class="result-error">
                错误: {{ result.error || '未知错误' }}
              </p>
            }
          </div>
        </div>
      </div>
    }
  </div>
</div>
