<div class="builder-settings">
  <mat-accordion>
    <mat-expansion-panel [expanded]="true" (afterExpand)="onAfterExpand()">
      <mat-expansion-panel-header>
        <mat-panel-title> 配置 </mat-panel-title>
      </mat-expansion-panel-header>
      <mat-list>
        <div class="cards">
          @if (loading) {
            <div class="loading-wrapper">
              <app-loading />
            </div>
          }
          @if (content$ | async; as content) {
            @for (item of content; track item; let i = $index) {
              <div class="item">
                <div (click)="onJson(item)" class="item-click">
                  <div class="inner" matRipple>
                    <div class="title">
                      {{ item.title }}
                      <div
                        class="lang-badge"
                      >
                        {{ item.langcode }}
                      </div>
                    </div>
                    <div class="opacity-50">{{ item.url }}</div>
                    <div class="item-meta">
                      <div class="author">{{ item.author }}</div>
                      <div>{{ item.changed }}</div>
                    </div>
                  </div>
                </div>
              </div>
            }
          }
        </div>
        @if (pager) {
          <div class="pager">
            <mat-paginator
              (page)="onPageChange($event)"
              [length]="pager.totalItems"
              [pageSize]="pager.itemsPerPage"
              [showFirstLastButtons]="true"
              [hidePageSize]="true"
              [pageIndex]="pager.currentPage"
              aria-label="Select page"
            />
          </div>
        }
      </mat-list>
      <mat-action-row>
        <app-btn
          (click)="reload()"
          [content]="{
            label: '刷新',
            color: 'primary',
            icon: { svg: 'reload', inline: true },
          }"
        />
        <app-btn
          (click)="addJSON()"
          [content]="{
            label: '新建配置',
            color: 'primary',
            icon: { svg: 'pencil-plus', inline: true },
          }"
        />
      </mat-action-row>
    </mat-expansion-panel>
  </mat-accordion>
</div>
