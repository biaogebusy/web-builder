@if (content(); as contentValue) {
  <div class="showcase-1-v4" [class]="contentValue.classes">
    @if (contentValue.text) {
      <app-text [attr.data-path]="'text'" [content]="contentValue.text" />
    }
    <div class="elements-grid">
      @for (item of contentValue.elements; track item; let i = $index) {
        <app-dynamic-component
          [attr.data-path]="'elements.' + i"
          class="box p-3 col-span-12 sm:col-span-6 md:col-span-{{ contentValue.row }}"
          [inputs]="item"
        />
      }
    </div>
    @if (contentValue.actions) {
      <div class="actions m-top">
        @for (action of contentValue.actions; track action; let i = $index) {
          <app-dynamic-component [attr.data-path]="'actions.' + i" [inputs]="action" />
        }
      </div>
    }
  </div>
}
