@if (content(); as contentValue) {
  <div class="showcase-1-v3" [class]="contentValue.classes">
    @if (contentValue.text) {
      <app-text [attr.data-path]="'text'" [content]="contentValue.text" />
    }
    @for (item of contentValue.elements; track item; let i = $index) {
      <app-dynamic-component [attr.data-path]="'elements.' + i" [inputs]="item" />
    }
    @if (contentValue.actions) {
      <div class="actions-row">
        @for (item of contentValue.actions; track item; let i = $index) {
          <app-dynamic-component [attr.data-path]="'actions.' + i" [inputs]="item" />
        }
      </div>
    }
  </div>
}
