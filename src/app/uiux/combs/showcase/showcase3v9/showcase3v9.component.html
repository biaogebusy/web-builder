@if (content(); as contentValue) {
  <div class="showcase-3-v9">
    @if (contentValue) {
      <div class="inner">
        <div
          class="left order-{{
            contentValue.order.left
          }}"
        >
          @for (item of contentValue.left; track item; let i = $index) {
            <app-dynamic-component
              [attr.data-path]="'left.' + i"
              class="p-x-sm left-item"
              [inputs]="item"
            />
          }
        </div>
        <div
          class="right order-{{
            contentValue.order.right
          }}"
        >
          @for (item of contentValue.right; track item; let i = $index) {
            <app-dynamic-component
              [attr.data-path]="'right.' + i"
              class="right-item"
              [inputs]="item"
            />
          }
        </div>
      </div>
    }
  </div>
}
