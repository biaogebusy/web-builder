@if (content(); as contentValue) {
  <div class="showcase-2v1">
    <div class="wrapper">
      @if (contentValue.text) {
        <app-text [attr.data-path]="'text'" [content]="contentValue.text" />
      }
      <div class="elements-grid m-y">
        @for (item of elements; track item; let i = $index) {
          <app-dynamic-component
            [attr.data-path]="'elements.' + i"
            class="m-bottom-sm col-span-12 sm:col-span-6 md:col-span-{{ contentValue.row }}"
            [inputs]="item"
          />
        }
      </div>
    </div>
  </div>
}
