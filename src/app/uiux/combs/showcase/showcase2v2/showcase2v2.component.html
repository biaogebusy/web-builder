@if (content(); as contentValue) {
  <div class="showcase-2v2">
    <div class="wrapper">
      @if (contentValue.text) {
        <app-text [attr.data-path]="'text'" [content]="contentValue.text" />
      }
      <div class="elements-grid m-y">
        @for (case of contentValue.elements; track case; let i = $index) {
          <app-card
            [attr.data-path]="'elements.' + i"
            class="m-bottom-sm col-span-12 md:col-span-{{ contentValue.row }}"
            [content]="case"
          />
        }
      </div>
    </div>
  </div>
}
