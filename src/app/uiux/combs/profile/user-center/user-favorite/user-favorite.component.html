@if (content(); as contentValue) {
  <div class="user-favorite">
    <div class="container">
      @if (contentValue.text) {
        <app-text [content]="contentValue.text" />
      }
      @if (lists$ | async; as lists) {
        <app-list-thin [pager]="pager" [content]="lists" [loading]="loading" />
      }
    </div>
  </div>
}
