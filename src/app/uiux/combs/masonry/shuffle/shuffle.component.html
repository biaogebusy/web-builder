@if (content(); as contentValue) {
  <div class="shuffle-container">
    @if (contentValue.title) {
      <app-title [attr.data-path]="'title'" [content]="contentValue.title" />
    }
    @if (contentValue.filter) {
      <div class="filter">
        <mat-button-toggle-group
          name="toggle group"
          aria-label="toggle group"
          (change)="onChange($event)"
        >
          @for (item of contentValue.filter; track item) {
            @if (item.value) {
              <mat-button-toggle value="{{ item.value }}">
                {{ item.label }}
              </mat-button-toggle>
            }
          }
        </mat-button-toggle-group>
      </div>
    }
    <div class="shuffle-inner">
      @for (item of contentValue.elements; track item) {
        <div class="item" [attr.data-groups]="item.category">
          <app-dynamic-component [inputs]="item" />
        </div>
      }
      <div class="sizer"></div>
    </div>
  </div>
}
