@if (data?.toggle) {
  <mat-button-toggle-group
    class="toggle-group"
    (change)="onChange($event)"
    name="switchChart"
    aria-label="switch chart"
  >
    @for (item of data.toggle; track item) {
      <mat-button-toggle value="{{ item.value }}">
        @if (item.icon) {
          <app-icon [content]="item.icon" />
        }
        {{ item.label }}
      </mat-button-toggle>
    }
  </mat-button-toggle-group>
}
<div
  #echarts
  class="chart"
  [ngStyle]="style"
></div>
