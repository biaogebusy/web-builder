@if (data$ | async; as data) {
  <div class="chart-box">
    <div class="chart-info">
      <div class="title mat-h3 one-line" [attr.data-path]="'label'" contentedit="label">
        {{ data.label }}
      </div>
      <div class="count one-line">
        {{ data.total }}
      </div>
    </div>
    @if (showChart()) {
      @defer (hydrate on viewport) {
        <app-chart class="chart-area" [content]="data.chart" [style]="style" />
      } @placeholder {
        <div class="chart-area chart-skeleton" [style]="style"></div>
      }
    }
  </div>
}
