<div class="taxonomy-list m-y">
  <div class="container">
    <div class="inner-row m-top-sm">
      <div class="list flex-12/12 md:flex-9/12">
        <app-list class="list-block" [content]="content.elements" [pager]="content.pager" />
      </div>
      @if (content.sidebar) {
        <app-sidebar class="flex-12/12 md:flex-3/12" [content]="content.sidebar" />
      }
    </div>
  </div>
</div>
