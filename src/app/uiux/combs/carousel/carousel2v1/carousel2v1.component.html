@if (content(); as contentValue) {
  <div class="carousel-2-v1" [class.text-white]="contentValue.bg">
    @if (contentValue.title) {
      <app-title [attr.data-path]="'title'" [content]="contentValue.title" />
    }
    <app-swiper [attr.data-path]="'swiper'" [content]="contentValue.swiper" />
  </div>
}
