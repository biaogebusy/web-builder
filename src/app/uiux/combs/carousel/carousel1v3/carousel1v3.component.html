@if (content(); as contentValue) {
  <div class="carousel-1-v3" [class]="contentValue.classes">
    @if (contentValue.text) {
      <app-text [attr.data-path]="'text'" [content]="contentValue.text" />
    }
    <app-spacer [size]="'sm'" />
    <app-swiper [attr.data-path]="'swiper'" [content]="contentValue.swiper" />
  </div>
}
