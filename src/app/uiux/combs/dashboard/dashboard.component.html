@if (content(); as contentValue) {
  <div class="dashboard">
    <div class="wrapper" *reqRolesIf="contentValue">
      @for (box of contentValue.elements; track box; let index = $index) {
        <div class="element-col flex-12/12 md:flex-{{ box.row }}/12">
          <app-dynamic-component
            [attr.data-path]="'elements.' + index"
            class="box"
            [inputs]="box"
          ></app-dynamic-component>
        </div>
      }
    </div>
  </div>
}
