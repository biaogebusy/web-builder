@let builderConfig = builderConfig$ | async;
@if (screenService.isPlatformBrowser()) {
  <div class="code-editor-btns">
    <app-btn
      (click)="onShowMore()"
      [class.lock]="isCollapse()"
      [content]="{
        color: undefined,
        mode: 'icon',
        icon: { svg: isMore() ? 'chevron-up' : 'chevron-down' },
        disabled: isCollapse(),
      }"
      matTooltip="{{ isMore() ? '展开' : '收起' }}"
      matTooltipPosition="above"
    ></app-btn>
    <app-btn
      class="set-bottom"
      (click)="toggleCollapse()"
      [content]="{
        color: undefined,
        mode: 'icon',
        icon: { svg: isCollapse() ? 'tray-arrow-up' : 'tray-arrow-down' },
      }"
      [matTooltip]="isCollapse() ? '恢复' : '置底'"
      matTooltipPosition="above"
    ></app-btn>
  </div>
  <div class="toolbar">
    <div class="toolbar-label">{{ isAPI() ? '数据来源 API' : 'Tailwind 自定义组件' }}</div>
    @if (builderConfig?.codeEditor?.help) {
      <app-btn
        class="btn-help"
        [content]="{
          color: undefined,
          mode: 'icon',
          icon: { svg: 'tooltip-question-outline' },
        }"
        (click)="showHelp(builderConfig?.codeEditor?.help)"
        matTooltip="查看语法"
        matTooltipPosition="above"
      ></app-btn>
    }
  </div>
  <div
    class="code-editor"
    [class.collapse]="isCollapse()"
    [class]="isMore() ? 'more' : 'less'"
  >
    @if (isAPI()) {
      <div
        class="box api-box {{
          isAPI() ? 'md:col-span-3' : ''
        }}"
      >
        <app-formly class="formly-block" [form]="form" [fields]="fields" [model]="model" />
        <pre #jsonblock class="json-pre">
          <code [innerHTML]="highlightedCode()" class="language-json code-block"></code>
        </pre>
      </div>
    }
    <div class="box editor-box {{ isAPI() ? 'md:col-span-9' : '' }}">
      <ngx-monaco-editor
        class="monaco-editor"
        [options]="MonacoOptions"
        [ngModel]="html()"
        [formControl]="htmlForm"
      />
    </div>
    @if (editing()) {
      <div class="editing">
        <app-loading [content]="{ size: 30 }" />
      </div>
    }
  </div>
}
