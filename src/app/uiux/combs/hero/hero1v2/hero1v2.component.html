@if (content) {
  <div class="hero-1-v2">
    <div class="hero-inner">
      <div class="swiper-media">
        <app-swiper
          [index]="index"
          [attr.data-path]="'right'"
          (slideChange)="onSlideChange($event)"
          [content]="content.right"
        />
      </div>
      <div class="swiper-text">
        <app-swiper
          [index]="index"
          (slideChange)="onSlideChange($event)"
          [content]="content.left"
          [attr.data-path]="'left'"
        />
      </div>
    </div>
  </div>
}
