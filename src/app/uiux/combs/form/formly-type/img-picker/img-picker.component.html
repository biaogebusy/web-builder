<div class="img-picker">
  @if (formControl.value) {
    <div class="meta">
      <img src="{{ src }}" alt="" />
      <div class="content">
        <div class="title">{{ field.props?.fileName }}</div>
        <div class="desc">{{ field.props?.alt }}</div>
      </div>
    </div>
  }
  <div class="actions">
    @if (formControl.value) {
      <app-btn (click)="remove()" [content]="{ label: to.deleteLabel, color: 'warn' }" />
    }
    <app-btn
      (click)="openMedias()"
      [content]="{
        label: formControl.value ? to.updateLabel : to.addLabel,
        color: to.color || 'primary',
        mode: to.mode || 'stroked',
      }"
    />
  </div>
</div>
