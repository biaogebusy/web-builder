<section class="terms-section" [formGroup]="form">
  <mat-checkbox class="terms-checkbox" formControlName="{{ content.key }}" [(ngModel)]="content.value" />
  <a
    (click)="openTermService(content?.params)"
    href="javascript:void(0)"
    class="terms-link"
    [innerHTML]="content.label | safeHtml"
  ></a>
</section>
