@if (content(); as contentValue) {
  <div class="comment-form m-bottom">
    <a class="anchor" id="comment"></a>
    <app-title [content]="contentValue.editor?.title" />
    <div class="editor">
      @if (screenService.isPlatformBrowser()) {
        <quill-editor
          (onEditorCreated)="editorCreated($event)"
          [modules]="modules"
          [placeholder]="contentValue.editor?.placeholder || placeholder"
          [(ngModel)]="commentContent"
          [styles]="{ height: contentValue.editor?.height || '250px' }"
        />
      }
    </div>
    <div class="actions p-y-sm p-x-sm">
      <button
        (click)="onSubmit(commentContent())"
        mat-raised-button
        color="primary"
        [disabled]="!commentContent()"
      >
        <div class="submit-inner">
          @if (loading) {
            <app-loading />
          }
          <span class="submit-label">{{ contentValue.editor?.action?.label || '提交' }}</span>
        </div>
      </button>
      <button class="cancel-btn" (click)="onCancel()" mat-button>取消</button>
    </div>
  </div>
}
