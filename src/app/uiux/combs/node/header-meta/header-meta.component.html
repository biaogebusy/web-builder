@if (content(); as contentValue) {
  <div class="header-meta">
    <app-text class="flex-12/12 md:flex-8/12" [content]="contentValue.text" />
    <div class="meta flex-12/12 md:flex-4/12">
      @for (item of contentValue.meta; track item) {
        <div class="item">
          <span class="label">{{ item.label }}</span>
          <span class="value mat-headline-3 m-bottom-0">{{ item.value }}</span>
        </div>
      }
    </div>
  </div>
}
