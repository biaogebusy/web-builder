<div class="content-text-center">
  <div class="media" [ngClass]="content.ratios || 'media-4-3'">
    @if (content.img) {
      <app-img [attr.data-path]="'img'" [content]="content.img" />
    }
  </div>
  <div class="overlay-content">
    <div
      contentedit="text"
      class="text-inner"
      [innerHTML]="content.text | safeHtml"
    ></div>
  </div>
</div>
