@if (content(); as contentValue) {
  <div class="progress-bar">
    @if (contentValue.label) {
      <div class="label">{{ contentValue.label }}</div>
    }
    <mat-progress-bar
      [color]="contentValue.color"
      [mode]="contentValue.mode || 'determinate'"
      [value]="contentValue.value"
      [bufferValue]="contentValue.bufferValue || 0"
    />
  </div>
}
