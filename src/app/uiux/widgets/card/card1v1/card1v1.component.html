@if (content(); as c) {
<div
  class="card-1v1"
  [class]="c.classes"
>
  @if (c.feature) {
    <app-feature-box [attr.data-path]="'feature'" [content]="c.feature" />
  }
  @if (c.components) {
    <div class="components">
      @for (item of c.components; track item; let i = $index) {
        <app-dynamic-component [attr.data-path]="'components.' + i" [inputs]="item" />
      }
    </div>
  }
  <div class="card-body p-y-sm p-x-sm">
    @if (c.link) {
      <div class="title mat-h2 two-line">
        <app-link [attr.data-path]="'link'" [content]="c.link" />
      </div>
    }
    @if (c.moreLabel) {
      <div class="post-meta">
        @if (c.link) {
          <a [href]="c.link.href" class="text-muted readmore">
            <span contentedit="moreLabel" [innerHTML]="c.moreLabel | safeHtml"></span>
            <mat-icon>navigate_next</mat-icon>
          </a>
        }
      </div>
    }
  </div>
  <div class="author">
    @if (c.user) {
      <small class="user"> <mat-icon inline="true">person</mat-icon> {{ c.user }} </small>
    }
    @if (c.time) {
      <small class="date">
        <mat-icon inline="true">event</mat-icon> {{ c.time }}
      </small>
    }
  </div>
</div>
}
