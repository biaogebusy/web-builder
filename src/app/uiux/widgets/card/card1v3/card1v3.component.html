<div class="card-1-v3">
  @if (content) {
    <cdk-virtual-scroll-viewport [itemSize]="5" class="viewport">
      <div
        class="list item"
        [class.selected]="i == selectedId"
        matRipple
        [matRippleColor]="'rgba(0, 0, 0, 0.04)'"
        *cdkVirtualFor="let item of content.elements; index as i"
        (click)="onCard(item, i)"
      >
        <h3 class="bold">{{ item.title }}</h3>
        @if (item.address) {
          <div class="address">{{ item.address }}</div>
        }
        <div class="meta">
          @for (meta of item.meta; track meta) {
            <div class="li">
              @if (meta.icon) {
                <app-icon [content]="meta.icon" />
              }
              <span class="label">{{ meta.label }}:</span>
              <span>{{ meta.value }}</span>
            </div>
          }
        </div>
      </div>
    </cdk-virtual-scroll-viewport>
  }
</div>
