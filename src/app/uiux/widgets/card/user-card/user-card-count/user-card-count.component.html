@if (content(); as contentValue) {
  <div class="user-card-count">
    <div class="innner">
      @for (item of contentValue; track item) {
        <div class="item">
          <span>{{ item.title }}</span>
          <span class="m-left-xs">
            <app-number-animate [content]="item.digit"></app-number-animate>
          </span>
        </div>
      }
    </div>
  </div>
}
