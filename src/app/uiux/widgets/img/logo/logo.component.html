@if (content(); as contentValue) {
  @if (img) {
    <div class="logo">
      <app-img [content]="img" />
    </div>
  } @else {
    <a
      class="site-name mat-h2"
      [routerLink]="contentValue.href"
      [innerHTML]="contentValue.label | safeHtml"
    ></a>
  }
  @if (contentValue.version) {
    <span class="version">{{ contentValue.version }}</span>
  }
}
