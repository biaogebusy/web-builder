@if (links(); as linksValue) {
  <div class="pagination-simple">
    <div class="inner">
      <button
        [disabled]="!linksValue.prev"
        (click)="loadPage(linksValue.prev.href)"
        mat-icon-button
        matTooltip="上一页"
        matTooltipPosition="above"
      >
        <mat-icon>chevron_left</mat-icon>
      </button>
      <button
        [disabled]="!linksValue.next"
        (click)="loadPage(linksValue.next.href)"
        mat-icon-button
        matTooltip="下一页"
        matTooltipPosition="above"
      >
        <mat-icon>chevron_right</mat-icon>
      </button>
    </div>
  </div>
}
