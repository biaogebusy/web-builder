@if (content(); as contentValue) {
  <div class="media-meta">
    <div class="meta">
      <div class="top">{{ contentValue.date | date: 'd' }}</div>
      <div class="middle">
        {{ contentValue.date | date: 'y-M' }}
      </div>
      <div class="more">
        <a mat-button href="{{ contentValue.more.href }}" target="_blank">{{ contentValue.more.label }}</a>
      </div>
    </div>
    <div class="wrapper">
      <div class="title">
        <h2>
          <app-link [content]="contentValue.link" />
        </h2>
        <div class="time">{{ contentValue.date }}</div>
        <div
          class="content"
          [innerHTML]="contentValue.body | stripTags | trim | shorten: 150 : '...'"
        ></div>
      </div>
    </div>
  </div>
}
