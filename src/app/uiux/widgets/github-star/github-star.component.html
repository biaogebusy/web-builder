@if (coreConfig.github?.enable) {
  @if (repo$ | async; as repo) {
    <div class="github-star">
      <a class="item" [href]="repo.html_url" target="_blank">
        <app-icon [content]="{ svg: 'github', inline: true }" />
        <span>Star</span>
      </a>
      <a class="item right" [href]="repo.html_url" target="_blank">{{ repo.stargazers_count }}</a>
    </div>
  }
}
