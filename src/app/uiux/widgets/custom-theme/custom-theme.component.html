<div class="ct">
  <header class="ct-head">
    <p class="ct-eyebrow">主题</p>
    <h2 class="ct-title">自定义配色</h2>
    <p class="ct-desc">选一个主色，按 Material 3 规范实时生成整套配色。</p>
  </header>

  <section class="ct-section">
    <div class="ct-label-row">
      <span class="ct-label">主色</span>
      @if (dirty()) {
        <span class="ct-badge">未保存</span>
      }
    </div>
    <div class="ct-seed">
      <label class="ct-well" [style.background-color]="seed()">
        <input
          type="color"
          [value]="seed()"
          (input)="onSeedChange($any($event.target).value)"
          aria-label="选择主色"
        />
      </label>
      <div class="ct-hex">
        <span class="ct-hex-hash">#</span>
        <input
          class="ct-hex-input"
          type="text"
          spellcheck="false"
          maxlength="7"
          [value]="seed().replace('#', '')"
          (change)="onHexInput($any($event.target).value)"
          aria-label="十六进制颜色值"
        />
      </div>
    </div>

    <div class="ct-presets" role="group" aria-label="预设主色">
      @for (preset of presets; track preset.seed) {
        <button
          type="button"
          class="ct-dot"
          [class.is-active]="isActivePreset(preset.seed)"
          [style.--dot]="preset.seed"
          [title]="preset.name"
          (click)="onPreset(preset)"
          [attr.aria-label]="preset.name"
          [attr.aria-pressed]="isActivePreset(preset.seed)"
        ></button>
      }
    </div>
  </section>

  <section class="ct-section">
    <span class="ct-label">外观</span>
    <div class="ct-seg" role="radiogroup" aria-label="明暗模式">
      <button
        type="button"
        class="ct-seg-btn"
        [class.is-on]="!isDark()"
        role="radio"
        [attr.aria-checked]="!isDark()"
        (click)="onMode(false)"
      >
        <app-icon [content]="{ svg: 'white-balance-sunny', inline: true }" />
        浅色
      </button>
      <button
        type="button"
        class="ct-seg-btn"
        [class.is-on]="isDark()"
        role="radio"
        [attr.aria-checked]="isDark()"
        (click)="onMode(true)"
      >
        <app-icon [content]="{ svg: 'moon-waning-crescent', inline: true }" />
        深色
      </button>
    </div>
  </section>

  <section class="ct-section">
    <span class="ct-label">配色方案</span>
    <button
      type="button"
      class="ct-select"
      [matMenuTriggerFor]="schemeMenu"
      aria-label="配色方案"
    >
      <span class="ct-select-value">{{ variantLabel() }}</span>
      <span class="ct-select-caret" aria-hidden="true"></span>
    </button>
    <mat-menu #schemeMenu="matMenu" class="ct-menu">
      @for (v of variants; track v.value) {
        <button type="button" mat-menu-item (click)="onVariant(v.value)">
          {{ v.label }}
        </button>
      }
    </mat-menu>
  </section>

  <section class="ct-section">
    <span class="ct-label">生成预览</span>
    <div class="ct-pairs">
      @for (pair of pairs(); track pair.label) {
        <div class="ct-pair" [style.background-color]="pair.bg" [style.color]="pair.fg">
          <span class="ct-pair-name">{{ pair.label }}</span>
          <span class="ct-pair-hex">{{ pair.bg }}</span>
        </div>
      }
    </div>
    <div class="ct-ramp" [style.border-color]="outline()" aria-label="表面层级">
      @for (surface of surfaces(); track $index) {
        <span class="ct-ramp-step" [style.background-color]="surface"></span>
      }
    </div>
  </section>

  <footer class="ct-actions">
    <app-btn [content]="{ mode: 'stroked', label: '重置' }" (btnClick)="onReset()" />
    <app-btn
      class="ct-apply"
      [content]="{
        mode: 'flat',
        color: 'primary',
        label: '应用主题',
        icon: { svg: 'check', inline: true },
      }"
      (btnClick)="onSave()"
    />
  </footer>
</div>
