<div
  class="layout-toolbar"
  #toolbar
  aria-hidden="true"
  (click)="hiddenWidgetPicker()"
>
  <app-btn
    [matMenuTriggerFor]="menu"
    class="toggle"
    #myMenu
    matTooltip="配置当前栏"
    matTooltipPosition="above"
    [content]="{
      label: '',
      mode: 'icon',
      icon: { svg: 'tune-vertical-variant' },
    }"
  />
  @let elements = lbContent().elements;
  <mat-menu #menu="matMenu" class="layout-toolbar-menu">
    <button
      [disabled]="!(i() > 0 && i() < elements.length)"
      mat-menu-item
      (click)="onMoveCol('left', elements, toolbar, i())"
    >
      <div class="menu-item-inner">
        <app-icon [content]="{ svg: 'chevron-left' }" />
        <span>左移</span>
      </div>
    </button>
    <button
      mat-menu-item
      [disabled]="!(i() > -1 && i() < elements.length - 1)"
      (click)="onMoveCol('right', elements, toolbar, i())"
    >
      <div class="menu-item-inner">
        <app-icon [content]="{ svg: 'chevron-right' }" />
        <span>右移</span>
      </div>
    </button>
    <mat-divider />
    <button mat-menu-item (click)="addBlock('layout', lbContent())">
      <div class="menu-item-inner">
        <app-icon [content]="{ svg: 'plus' }" />
        <span>选择组件插入新一栏</span>
      </div>
    </button>
    <button mat-menu-item (click)="onDeleteRow(toolbar)">
      <div class="menu-item-inner">
        <app-icon [content]="{ svg: 'close' }" />
        <span>移除当前栏</span>
      </div>
    </button>
    <mat-divider />
    <button mat-menu-item (click)="onLayoutSettings(layout(), toolbar)">
      <div class="menu-item-inner">
        <app-icon [content]="{ svg: 'responsive' }" />
        <span>当前栏配置</span>
      </div>
    </button>
  </mat-menu>
</div>
