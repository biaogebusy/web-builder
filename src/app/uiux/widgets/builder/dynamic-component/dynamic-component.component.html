@let i = inputs();
@if (showToolbar() && i) {
  <app-component-toolbar [content]="i" />
}
@let content = compContent();
@if (content?.id) {
  <span class="anchor" [id]="content.id"></span>
}
@if (content?.spacer) {
  <app-spacer [size]="content.spacer" />
}
@if (content.bg; as bg) {
  <app-bg-img [attr.data-path]="'bg'" [content]="bg" />
}

<div class="content-wrapper {{ content?.fullWidth ? '' : 'container' }}">
  <ng-container #componentContainer />
</div>

@if (content?.spacer) {
  <app-spacer [size]="content.spacer" />
}
