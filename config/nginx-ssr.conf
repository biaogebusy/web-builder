# Nginx 配置优化 - SSR 超时控制
# 此配置用于代理 Node SSR 服务器（4200），替换原有的 300s 超时

location / {
    proxy_pass http://127.0.0.1:4200;
    proxy_set_header Host $host:$server_port;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header REMOTE-HOST $remote_addr;

    # ========== 关键改动：缩短超时时间 ==========
    # 原: proxy_connect_timeout 60s;
    #     proxy_send_timeout 300s;
    #     proxy_read_timeout 300s;
    #     send_timeout 300s;

    # 新配置
    proxy_connect_timeout 10s;   # 连接超时 10s
    proxy_send_timeout 60s;      # 发送超时 60s
    proxy_read_timeout 60s;      # 读超时 60s（SSR渲染通常 < 30s）
    send_timeout 60s;            # 客户端发送超时 60s

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 防止缓冲，SSR响应通常完整
    proxy_buffering off;

    # 添加超时响应头用于调试
    add_header X-Response-Time $request_time;
    add_header Strict-Transport-Security "max-age=31536000";
}
